<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Dashboard</title>

    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">

    <meta name="description" content="A simple dashboard for managing freelance projects.">
    <meta name="keywords" content="freelance, project, dashboard, project management, invoicing">
    <meta name="author" content="Anaid Ariwany">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Freelance Projects Dashboard">
    <meta property="og:description" content="A simple dashboard for managing freelance projects.">
    <meta property="og:image"
        content="https://anaid-ariwany.github.io/Freelance-Client-Dashboard/assets/images/websitePreview.webp">
    <meta property="og:url" content="https://anaid-ariwany.github.io/Freelance-Client-Dashboard/">
    <meta property="og:type" content="website">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600" rel="stylesheet" />

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <main class="row gx-0 appLayout">
        <section class="col-12 col-md-4 col-xl-3 sidebar">
            <div class="logoDiv">
                <img src="../assets/images/logoNB.webp" alt="logo" class="logo">
            </div>

            <div>
                <h4>
                    <span class="badge"><img src="../assets/icons/dashboardIcon.webp" alt="dashboard icon"
                            class="sidebarIcon"></span>
                    <a href="../index.html">Dashboard</a>
                </h4>

                <h4>
                    <span class="badge"><img src="../assets/icons/clientsIcon.webp" alt="clients icon"
                            class="sidebarIcon"></span>
                    <a href="clients.html">Clients</a>
                </h4>

                <h4 class="projectsH4">
                    <span class="badge"><img src="../assets/icons/projectsIcon.webp" alt="projects icon"
                            class="sidebarIcon"></span>
                    <a href="projects.html">Projects</a>
                </h4>

                <h4>
                    <span class="badge"><img src="../assets/icons/settingsIcon.webp" alt="settings icon"
                            class="sidebarIcon"></span>
                    <a href="settings.html">Settings</a>
                </h4>
            </div>

            <div class="logoutDiv">
                <h4>
                    <span class="badge">
                        <img src="../assets/icons/logoutIcon.webp" alt="logout icon" class="sidebarIcon">
                    </span>
                    <span class="disabled-link"
                        style="color: gray; cursor: not-allowed; text-decoration: none;">Logout</span>
                </h4>
            </div>
        </section>

        <section class="col-12 col-md-8 col-xl-9 rightSection settingsPage">
            <div class="settingsShell">
                <section class="settingsCard">
                    <div class="settingsIntro">
                        <h1>Appearance</h1>
                        <p>Customize your theme for a tailored experience</p>
                    </div>

                    <form class="themeForm" id="themeSettingsForm">
                        <fieldset class="themeFieldset">
                            <legend>Theme</legend>

                            <div class="themeOptions" role="radiogroup" aria-label="Theme selection">
                                <label class="themeOption">
                                    <input type="radio" name="themePreference" value="light">
                                    <span class="themePreview lightPreview" aria-hidden="true">
                                        <span class="previewTop"></span>
                                        <span class="previewLine previewLineWide"></span>
                                        <span class="previewLine previewLineLong"></span>
                                        <span class="previewAccent"></span>
                                    </span>
                                    <span class="themeOptionLabel">Light mode</span>
                                </label>

                                <label class="themeOption">
                                    <input type="radio" name="themePreference" value="dark">
                                    <span class="themePreview darkPreview" aria-hidden="true">
                                        <span class="previewTop"></span>
                                        <span class="previewLine previewLineWide"></span>
                                        <span class="previewLine previewLineLong"></span>
                                        <span class="previewAccent"></span>
                                    </span>
                                    <span class="themeOptionLabel">Dark mode</span>
                                </label>

                                <label class="themeOption">
                                    <input type="radio" name="themePreference" value="auto">
                                    <span class="themePreview autoPreview" aria-hidden="true">
                                        <span class="previewPane previewPaneLight">
                                            <span class="previewTop"></span>
                                            <span class="previewLine previewLineWide"></span>
                                            <span class="previewLine previewLineShort"></span>
                                            <span class="previewAccent"></span>
                                        </span>
                                        <span class="previewPane previewPaneDark">
                                            <span class="previewTop"></span>
                                            <span class="previewLine previewLineWide"></span>
                                            <span class="previewLine previewLineShort"></span>
                                            <span class="previewAccent"></span>
                                        </span>
                                    </span>
                                    <span class="themeOptionLabel">Auto</span>
                                </label>
                            </div>
                        </fieldset>

                        <div class="settingsActions">
                            <button type="button" class="settingsBtn settingsBtnSecondary" id="themeCancelBtn">Cancel</button>
                            <button type="submit" class="settingsBtn settingsBtnPrimary">Save changes</button>
                        </div>
                    </form>
                </section>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="settings.js"></script>
    <script src="../scripts/storage.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../script.js"></script>
</body>

</html>
