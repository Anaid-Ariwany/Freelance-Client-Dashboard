<!DOCTYPE html>
<html lang="en">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Freelance Projects Dashboard</title>

        <!-- favicon -->
        <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">

        <!-- seo meta -->
        <meta name="description" content="A simple dashboard for managing freelance projects.">
        <meta name="keywords" content="freelance, project, dashboard, project management, invoicing">
        <meta name="author" content="Anaid Ariwany">
        <meta name="robots" content="index, follow">

        <!-- open graph -->
        <meta property="og:title" content="Freelance Projects Dashboard">
        <meta property="og:description" content="A simple dashboard for managing freelance projects.">
        <meta property="og:image"
            content="https://anaid-ariwany.github.io/Freelance-Client-Dashboard/assets/images/websitePreview.webp">
        <meta property="og:url" content="https://anaid-ariwany.github.io/Freelance-Client-Dashboard/">
        <meta property="og:type" content="website">

        <!-- bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- inter font -->
        <link rel="preconnect" href="https://fonts.bunny.net">
        <link href="https://fonts.bunny.net/css?family=inter:400,500,600" rel="stylesheet" />

        <!-- custom css -->
        <link rel="stylesheet" href="projects.css">
        <link rel="stylesheet" href="../style.css">

    </head>
</head>

<body>

    <main class="row gx-0">

        <!-- sidebar -->
        <section class="col-sm-3 sidebar">

            <div class="logoDiv">
                <img src="../assets/images/logoNB.webp" alt="logo" class="logo">
            </div>

            <div>

                <h4>
                    <span class="badge"><img src="../assets/icons/dashboardIcon.webp" alt="dashboard icon"
                            class="sidebarIcon"></span>
                    <a href="../index.html">Dashboard</a>
                </h4>


                <h4>
                    <span class="badge"><img src="../assets/icons/clientsIcon.webp" alt="clients icon"
                            class="sidebarIcon"></span>
                    <a href="clients.html">Clients</a>
                </h4>

                <h4 class="projectsH4">
                    <span class="badge"><img src="../assets/icons/projectsIcon.webp" alt="projects icon"
                            class="sidebarIcon"></span>
                    <a href="projects.html">Projects</a>
                </h4>

                <h4>
                    <span class="badge"><img src="../assets/icons/settingsIcon.webp" alt="settings icon"
                            class="sidebarIcon"></span>
                    <a href="settings.html">Settings</a>
                </h4>

            </div>

            <div class="logoutDiv">

                <h4>
                    <span class="badge">
                        <img src="../assets/icons/logoutIcon.webp" alt="settings icon" class="sidebarIcon">
                    </span>

                    <span class="disabled-link"
                        style="color: gray; cursor: not-allowed; text-decoration: none;">Logout</span>
                </h4>

        </section>

        <!-- right section -->
        <section class="col-sm-9 rightSection">
            <h1>Freelance Projects Dashboard</h1>

            <!-- search div -->
            <div>
                <input type="text" placeholder="Search projects..." class="searchInput">
            </div>

            <div class="addButtonDiv">
                <button type="button" class="addProjectButton" data-bs-toggle="modal"
                    data-bs-target="#projectFormModal">Add
                    Project</button>
            </div>

            <!-- project list -->
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Client</th>
                            <th>Status</th>
                            <th>Deadline</th>
                            <th>Budget</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projectList"></tbody>
                </table>
            </div>
        </section>

        <!-- project form in modal -->
        <div class="modal fade" id="projectFormModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="projectFormModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="projectFormModalLabel">Add Project</h5>
                    </div>
                    <div class="modal-body">
                        <form id="projectForm">

                            <div class="mb-3">
                                <label for="projectName" class="form-label">Project Name</label>
                                <input type="text" class="form-control" id="projectName" required>
                            </div>

                            <div class="mb-3">
                                <label for="clientNameSelect" class="form-label">Client Name</label>
                                <select class="form-select" id="clientNameSelect" required>
                                    <option value="">Select Client</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" required>
                                    <option value="">Select Status</option>
                                    <option value="Not Started">Not Started</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="deadline" class="form-label">Deadline</label>
                                <input type="date" class="form-control" id="deadline" required>
                            </div>

                            <div class="mb-3">
                                <label for="budget" class="form-label">Budget</label>
                                <input type="number" class="form-control" id="budget" required>
                            </div>

                            <div class="mb-3 modal-footer">
                                <button type="submit" id="formSubmitButton" class="btn btn-primary">Add Project</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- custom js -->
    <script src="../scripts/storage.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../script.js"></script>
</body>

</html>
